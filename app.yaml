command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000"]
resources:
  - name: sql-warehouse
    sql_warehouse:
      id: "e0458b451165d343"
      permission: CAN_USE
env:
  - name: DATABRICKS_WAREHOUSE_ID
    value: "e0458b451165d343"
  - name: SERVING_ENDPOINT
    value: "databricks-claude-sonnet-4-6"
  - name: LAKEBASE_HOST
    value: "ep-bold-truth-d7c3zwwa.database.eu-central-1.cloud.databricks.com"
  - name: LAKEBASE_PORT
    value: "5432"
  - name: LAKEBASE_DB
    value: "impulse"
  - name: LAKEBASE_PROJECT
    value: "impulse"
  - name: SECRET_SCOPE
    value: "impulse"
  - name: SECRET_KEY_NAME
    value: "fernet-key"
  - name: INGEST_NODE_TYPE
    value: "i3.xlarge"
