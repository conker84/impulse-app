bundle:
  name: impulse

# frontend/dist/ is gitignored (secret scanner false-positives on minified
# third-party JS) but the built bundle MUST ship with the app — otherwise
# app.py falls through to the FastAPI JSON root and the UI never renders.
# install.sh runs `npm run build` immediately before `bundle deploy` so the
# directory exists at upload time.
sync:
  include:
    - frontend/dist/**
    # profiles.yaml is gitignored (customer-specific schema mapping), so bundle
    # sync skips it by default; force-include it or the app falls back to the
    # built-in SchemaProfile defaults at runtime.
    - profiles.yaml

variables:
  app_name:
    description: Name for the app, Lakebase instance, and SQL warehouse (they all share it). Pass --var app_name=foo to override.
    default: impulse-dev
  end_user_group:
    description: Workspace group granted CAN_USE on the app + warehouse
    default: users

resources:
  database_instances:
    impulse_db:
      name: ${var.app_name}
      capacity: CU_1

  sql_warehouses:
    impulse_warehouse:
      name: ${var.app_name}
      cluster_size: Medium
      enable_serverless_compute: true
      auto_stop_mins: 10
      min_num_clusters: 1
      max_num_clusters: 1
      permissions:
        - level: CAN_USE
          group_name: ${var.end_user_group}

  apps:
    impulse_app:
      name: ${var.app_name}
      source_code_path: ${workspace.file_path}
      compute_size: LARGE
      config:
        # Wire the warehouse + Lakebase instance directly from the bundle's
        # resource refs so the app does not depend on runtime name-matching.
        # mode: development prefixes the warehouse name (e.g. "[dev user] foo"),
        # which broke resolve_warehouse_id()'s exact-name lookup; the explicit
        # id env var (preferred by config.py) sidesteps that entirely.
        env:
          - name: DATABRICKS_WAREHOUSE_ID
            value: ${resources.sql_warehouses.impulse_warehouse.id}
          - name: LAKEBASE_INSTANCE_NAME
            value: ${resources.database_instances.impulse_db.name}
        command:
          # The Apps runtime ships Databricks CLI v0.251.0, whose bundled
          # Terraform download fails with `openpgp: key expired` (HashiCorp
          # rotated the signing key). v0.251.1 is a drop-in patch with the
          # new key (github.com/databricks/cli/issues/5022). Install it to
          # ~/.local/bin on first boot, prepend to PATH, then exec uvicorn.
          # Cached install — re-run is a no-op once the binary is in place.
          - bash
          - -c
          - |
            set -e
            CLI_DIR=/tmp/databricks-cli
            if [ "$($CLI_DIR/databricks --version 2>/dev/null | awk '{print $3}')" != "v0.251.1" ]; then
              echo "[startup] installing patched databricks CLI v0.251.1 to $CLI_DIR..."
              curl -fsSL "https://github.com/databricks/cli/releases/download/v0.251.1/databricks_cli_0.251.1_linux_amd64.zip" -o /tmp/cli.zip
              mkdir -p "$CLI_DIR"
              unzip -oq /tmp/cli.zip -d "$CLI_DIR"
              rm /tmp/cli.zip
              echo "[startup] installed: $($CLI_DIR/databricks --version)"
            fi
            export PATH="$CLI_DIR:$PATH"
            exec uvicorn app:app --host=0.0.0.0 --port=8000
      user_api_scopes:
        - sql
        - dashboards.genie
        - files.files
        - catalog.connections
        - catalog.catalogs:read
        - catalog.schemas:read
        - catalog.tables:read
        - serving.serving-endpoints
      # NOTE: Lakebase is deliberately NOT bound here as an app `database`
      # resource. That binding makes the Apps control plane grant the app SP
      # CONNECT/CREATE on the Postgres DB, a step that 403s for a non-admin
      # deployer ("cannot grant permissions for added resource: lakebase").
      # install.sh instead provisions the app SP's Postgres role directly (the
      # deployer owns databricks_postgres as the instance creator), and the app
      # (server/db.py) connects via the SDK with its own SP credential.
      resources:
        - name: sql
          sql_warehouse:
            id: ${resources.sql_warehouses.impulse_warehouse.id}
            permission: CAN_USE
      permissions:
        - level: CAN_USE
          group_name: ${var.end_user_group}

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: IMPULSE_DEV
  prod:
    default: false
    workspace:
      profile: IMPULSE_PROD
    variables:
      app_name: Impulse
