bundle:
  name: impulse

variables:
  app_name:
    description: Name for the app, Lakebase instance, and SQL warehouse (they all share it). Pass --var app_name=foo to override.
    default: impulse-v3
  catalog:
    description: Unity Catalog containing the customer's silver-layer impulse tables (channel_metrics, container_metrics, channels, etc.)
  schema:
    description: Schema within ${var.catalog} containing the impulse tables
  end_user_group:
    description: Workspace group granted CAN_USE on the app + warehouse
    default: users

resources:
  database_instances:
    impulse_db:
      name: ${var.app_name}
      capacity: CU_1

  sql_warehouses:
    impulse_warehouse:
      name: ${var.app_name}
      cluster_size: Medium
      enable_serverless_compute: true
      auto_stop_mins: 10
      min_num_clusters: 1
      max_num_clusters: 1
      permissions:
        - level: CAN_USE
          group_name: ${var.end_user_group}

  apps:
    impulse_app:
      name: ${var.app_name}
      source_code_path: ${workspace.file_path}
      compute_size: LARGE
      user_api_scopes:
        - sql
        - dashboards.genie
        - files.files
        - catalog.connections
        - catalog.catalogs:read
        - catalog.schemas:read
        - catalog.tables:read
        - serving.serving-endpoints
      resources:
        # Binding to `databricks_postgres` (the default DB on every Lakebase
        # instance) so the bundle deploys in one shot — DAB has no resource
        # to create a logical Postgres DB without also creating a UC catalog.
        # The SP gets CONNECT + CREATE; app data lives under SP-owned schema
        # `impulse` inside `databricks_postgres`. See TASKS.md follow-up.
        - name: lakebase
          database:
            instance_name: ${resources.database_instances.impulse_db.name}
            database_name: databricks_postgres
            permission: CAN_CONNECT_AND_CREATE
        - name: sql
          sql_warehouse:
            id: ${resources.sql_warehouses.impulse_warehouse.id}
            permission: CAN_USE
      permissions:
        - level: CAN_USE
          group_name: ${var.end_user_group}

targets:
  prod:
    default: true
