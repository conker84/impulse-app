bundle:
  name: impulse

# frontend/dist/ is gitignored (secret scanner false-positives on minified
# third-party JS) but the built bundle MUST ship with the app — otherwise
# app.py falls through to the FastAPI JSON root and the UI never renders.
# install.sh runs `npm run build` immediately before `bundle deploy` so the
# directory exists at upload time.
sync:
  include:
    - frontend/dist/**

variables:
  app_name:
    description: Name for the app, Lakebase instance, and SQL warehouse (they all share it). Pass --var app_name=foo to override.
    default: impulse-v3
  catalog:
    description: Unity Catalog containing the customer's silver-layer impulse tables (channel_metrics, container_metrics, channels, etc.)
  schema:
    description: Schema within ${var.catalog} containing the impulse tables
  end_user_group:
    description: Workspace group granted CAN_USE on the app + warehouse
    default: users

resources:
  database_instances:
    impulse_db:
      name: ${var.app_name}
      capacity: CU_1

  sql_warehouses:
    impulse_warehouse:
      name: ${var.app_name}
      cluster_size: Medium
      enable_serverless_compute: true
      auto_stop_mins: 10
      min_num_clusters: 1
      max_num_clusters: 1
      permissions:
        - level: CAN_USE
          group_name: ${var.end_user_group}

  apps:
    impulse_app:
      name: ${var.app_name}
      source_code_path: ${workspace.file_path}
      compute_size: LARGE
      config:
        command:
          # The Apps runtime ships Databricks CLI v0.251.0, whose bundled
          # Terraform download fails with `openpgp: key expired` (HashiCorp
          # rotated the signing key). v0.251.1 is a drop-in patch with the
          # new key (github.com/databricks/cli/issues/5022). Install it to
          # ~/.local/bin on first boot, prepend to PATH, then exec uvicorn.
          # Cached install — re-run is a no-op once the binary is in place.
          - bash
          - -c
          - |
            set -e
            CLI_DIR=/tmp/databricks-cli
            if [ "$($CLI_DIR/databricks --version 2>/dev/null | awk '{print $3}')" != "v0.251.1" ]; then
              echo "[startup] installing patched databricks CLI v0.251.1 to $CLI_DIR..."
              curl -fsSL "https://github.com/databricks/cli/releases/download/v0.251.1/databricks_cli_0.251.1_linux_amd64.zip" -o /tmp/cli.zip
              mkdir -p "$CLI_DIR"
              unzip -oq /tmp/cli.zip -d "$CLI_DIR"
              rm /tmp/cli.zip
              echo "[startup] installed: $($CLI_DIR/databricks --version)"
            fi
            export PATH="$CLI_DIR:$PATH"
            exec uvicorn app:app --host=0.0.0.0 --port=8000
      user_api_scopes:
        - sql
        - dashboards.genie
        - files.files
        - catalog.connections
        - catalog.catalogs:read
        - catalog.schemas:read
        - catalog.tables:read
        - serving.serving-endpoints
      resources:
        - name: lakebase
          database:
            instance_name: ${resources.database_instances.impulse_db.name}
            database_name: databricks_postgres
            permission: CAN_CONNECT_AND_CREATE
        - name: sql
          sql_warehouse:
            id: ${resources.sql_warehouses.impulse_warehouse.id}
            permission: CAN_USE
      permissions:
        - level: CAN_USE
          group_name: ${var.end_user_group}

targets:
  prod:
    default: true
