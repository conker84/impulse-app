bundle:
  name: impulse-revamp

# Bundle variables — customer values supplied either via:
#   1. install.sh (reads from app.yaml / profiles.yaml + interactive prompts), or
#   2. --var flags on the bundle deploy command line, or
#   3. setting the *.default field here per fork.
variables:
  app_name:
    description: |
      Name for the deployed app + Lakebase instance. Both share this name.
      Default is "impulse-v3" — chosen so the deploy-revamp branch deploy
      can't collide with the existing "impulse" / "impulse-v2" apps or the
      existing Lakebase instances on fe-vm-maximhammer. For a production
      deploy on a clean workspace, pass --var app_name=impulse.
    default: impulse-v3
  catalog:
    description: Unity Catalog containing the customer's silver-layer impulse tables (channel_metrics, container_metrics, channels, etc.)
  schema:
    description: Schema within ${var.catalog} containing the impulse tables
  warehouse_id:
    description: SQL warehouse ID the app uses for queries
  end_user_group:
    description: Workspace group granted CAN_USE on the app + warehouse
    default: users

resources:
  # Lakebase Postgres for app metadata (user_settings, saved_reports).
  # `database_instances` API silently creates an Autoscaling backend under
  # the hood (Databricks-side change rolled out 2026-03-12 — see TASKS.md).
  # The logical database `impulse` is created by install.sh via psql post-
  # deploy because `database_catalogs` (the DAB resource that creates it
  # declaratively) also registers a UC catalog, which requires CREATE
  # CATALOG on the metastore — a permission this app doesn't actually need.
  database_instances:
    impulse_db:
      name: ${var.app_name}
      capacity: CU_1

  apps:
    impulse_app:
      name: ${var.app_name}
      source_code_path: ${workspace.file_path}
      compute_size: LARGE
      user_api_scopes:
        - sql
        - dashboards.genie
        - files.files
        - catalog.connections
        - catalog.catalogs:read
        - catalog.schemas:read
        - catalog.tables:read
        - serving.serving-endpoints
      resources:
        # Lakebase binding — Databricks auto-provisions a Postgres role for
        # the app's SP and grants CONNECT + CREATE on the database.
        # Lakebase binding — Databricks auto-provisions a Postgres role for
        # the app's SP and grants CONNECT + CREATE on the bound database.
        # We bind to `databricks_postgres` (the default DB that exists on
        # every Lakebase instance) so the bundle deploys in one shot — no
        # extra step to create a logical DB. App data lives under a SP-owned
        # schema `impulse` inside `databricks_postgres`.
        - name: lakebase
          database:
            instance_name: ${resources.database_instances.impulse_db.name}
            database_name: databricks_postgres
            permission: CAN_CONNECT_AND_CREATE
        # Read SQL warehouse via the user's OBO token; the binding just
        # exposes the connection info to the app at runtime.
        - name: sql
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
      permissions:
        - level: CAN_USE
          group_name: ${var.end_user_group}

targets:
  prod:
    default: true
