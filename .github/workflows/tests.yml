name: Tests

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Backend pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system --group dev

      # Failing tests surface as inline annotations in the Checks tab / PR diff
      # via the pytest-github-actions-annotate-failures plugin (in the dev group),
      # which auto-activates when GITHUB_ACTIONS is set. No extra step needed.
      - name: Run tests
        run: python -m pytest --cov=server --cov-report=term-missing

  vitest:
    name: Frontend vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Vitest auto-detects GITHUB_ACTIONS and emits the github-actions reporter,
      # so failing tests surface as inline annotations in the Checks tab / PR diff.
      - name: Run tests
        run: npm test
